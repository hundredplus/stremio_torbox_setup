<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stremio + Torbox Easy Setup</title>
    <!-- Pulling in Tailwind CSS for quick styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans p-6 md:p-12">
    <div class="max-w-xl mx-auto bg-white p-8 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold text-center mb-6">Connect Torbox to Stremio</h1>
        
        <!-- Step 1: API Key Input with Direct Link -->
        <div class="mb-6">
            <label class="block text-sm font-semibold mb-2" for="apiKey">1. Enter Your Torbox API Key</label>
            
            <div class="flex flex-col sm:flex-row gap-2 mb-2">
                <!-- Direct link to Torbox Settings -->
                <a href="https://torbox.app/settings" target="_blank" class="bg-gray-200 hover:bg-gray-300 text-gray-800 text-sm font-semibold py-3 px-4 sm:py-2 rounded-lg transition flex items-center justify-center whitespace-nowrap">
                    Get My Key ↗
                </a>
                <input type="text" id="apiKey" class="w-full p-3 sm:p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Paste key here...">
            </div>
            
            <p class="text-xs text-gray-500 mt-1">Click "Get My Key", copy the long string under the API section, and paste it here.</p>
        </div>

        <!-- Step 2: Profile Selection -->
        <div class="mb-6">
            <label class="block text-sm font-semibold mb-2">2. Choose Your Experience</label>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <button onclick="setProfile('fast', this)" class="profile-btn p-3 border rounded-lg hover:bg-blue-50 focus:bg-blue-100 focus:border-blue-500 transition text-left outline-none">
                    <div class="font-bold text-blue-600">Fast</div>
                    <div class="text-xs text-gray-600 mt-1">1080p max. Best for slower internet connections.</div>
                </button>
                <button onclick="setProfile('balanced', this)" class="profile-btn p-3 border rounded-lg hover:bg-green-50 focus:bg-green-100 focus:border-green-500 transition text-left outline-none">
                    <div class="font-bold text-green-600">Balanced</div>
                    <div class="text-xs text-gray-600 mt-1">4K supported. Prioritizes reliable links over raw size.</div>
                </button>
                <button onclick="setProfile('quality', this)" class="profile-btn p-3 border rounded-lg hover:bg-purple-50 focus:bg-purple-100 focus:border-purple-500 transition text-left outline-none">
                    <div class="font-bold text-purple-600">Best Quality</div>
                    <div class="text-xs text-gray-600 mt-1">No limits. Pulls the heaviest 4K+ files available.</div>
                </button>
            </div>
        </div>

        <!-- Step 3: Action Area (Hidden until profile is clicked) -->
        <div id="resultArea" class="hidden mt-8 p-6 bg-gray-50 rounded-lg border text-center">
            <h3 class="text-lg font-bold mb-4">You're All Set!</h3>
            <a id="installBtn" href="#" class="block w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition shadow-md">
                Install to Stremio
            </a>
            <p class="text-xs text-gray-500 mt-4">Make sure the Stremio app is installed on this device before clicking.</p>
        </div>
    </div>

    <!-- The Logic -->
    <script>
        function setProfile(profile, btnElement) {
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) {
                alert('Please enter your Torbox API key first.');
                return;
            }

            // Optional: Visually highlight the selected button
            document.querySelectorAll('.profile-btn').forEach(btn => {
                btn.classList.remove('ring-2', 'ring-offset-2', 'ring-blue-500');
            });
            btnElement.classList.add('ring-2', 'ring-offset-2', 'ring-blue-500');

            let config = '';
            
            // Torrentio configuration mapping
            if (profile === 'fast') {
                // Sort by size (smallest first), filter out 4K, CAMs, screeners, hide non-debrid links
                config = 'sort=size|qualityfilter=4k,cam,screener|debridoptions=nodownloadlinks';
            } else if (profile === 'balanced') {
                // Sort by quality then size, filter out CAMs, screeners, hide non-debrid links
                config = 'sort=qualitysize|qualityfilter=cam,screener|debridoptions=nodownloadlinks';
            } else if (profile === 'quality') {
                // Sort purely by quality, hide non-debrid links
                config = 'sort=quality|debridoptions=nodownloadlinks';
            }

            // Append Torbox API Key
            config += `|torbox=${apiKey}`;

            // Generate URLs
            const manifestUrl = `${config}/manifest.json`;
            // Using stremio:// automatically triggers the app to open
            const stremioUrl = `stremio://torrentio.strem.fun/${manifestUrl}`;
            
            // Update UI
            document.getElementById('installBtn').href = stremioUrl;
            document.getElementById('resultArea').classList.remove('hidden');
        }
    </script>
</body>
</html>
