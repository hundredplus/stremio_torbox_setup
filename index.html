<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noontech Setup</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000;
  color: #fff;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 30px 20px;
}

.progress {
  height: 4px;
  background: #222;
  border-radius: 2px;
  margin-bottom: 30px;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #e50914;
  transition: 0.3s;
}

.step { display: none; }
.step.active { display: block; }

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.card {
  background: #111;
  border-radius: 16px;
  padding: 20px;
  cursor: pointer;
  border: 2px solid transparent;
}

.card.active {
  border-color: #e50914;
}

.button {
  margin-top: 25px;
  padding: 14px;
  background: #e50914;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  width: 100%;
}

.setting-box {
  background: #111;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.setting-box b {
  color: #22c55e;
}

.install-btn {
  display: block;
  margin-top: 20px;
  padding: 14px;
  background: #22c55e;
  text-align: center;
  border-radius: 8px;
  text-decoration: none;
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

  <div class="progress"><div class="progress-bar" id="progress"></div></div>

  <!-- STEP 1 -->
  <div class="step active" id="step1">
    <h1>Welcome</h1>
    <p>We’ll set up your streaming in under 1 minute</p>
    <button class="button" onclick="next()">Start</button>
  </div>

  <!-- STEP 2 -->
  <div class="step" id="step2">
    <h1>Choose Experience</h1>

    <div class="cards">
      <div class="card" onclick="selectProfile('fast', this)">
        ⚡ Ultra Fast
      </div>
      <div class="card" onclick="selectProfile('balanced', this)">
        🎬 Balanced
      </div>
      <div class="card" onclick="selectProfile('quality', this)">
        💎 Best Quality
      </div>
    </div>

    <button class="button" onclick="next()">Continue</button>
  </div>

  <!-- STEP 3 -->
  <div class="step" id="step3">
    <h1>Apply These Settings</h1>

    <div id="settings"></div>

    <a href="https://torbox.app/settings?section=integration-settings"
       target="_blank"
       class="install-btn">
       Open Torbox Settings
    </a>

    <button class="button" onclick="next()">Done</button>
  </div>

  <!-- STEP 4 -->
  <div class="step" id="step4">
    <h1>Install Addon</h1>

    <input id="addonUrl"
      placeholder="Paste Torbox addon URL"
      style="width:100%;padding:12px;border-radius:8px;border:none;background:#111;color:white">

    <button class="button" onclick="install()">Install</button>

    <a id="installLink" class="install-btn" style="display:none;">Open in Stremio</a>
  </div>

  <!-- STEP 5 -->
  <div class="step" id="step5">
    <h1>🎉 Done</h1>
    <p>Enjoy smooth streaming</p>
  </div>

</div>

<script>
let step = 1;
let profile = null;

function updateProgress() {
  document.getElementById("progress").style.width = (step - 1) * 25 + "%";
}

function next() {
  if (step === 2 && !profile) {
    alert("Select a profile");
    return;
  }

  document.getElementById("step" + step).classList.remove("active");
  step++;
  document.getElementById("step" + step).classList.add("active");

  if (step === 3) renderSettings();

  updateProgress();
}

function selectProfile(p, el) {
  profile = p;
  document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
}

function renderSettings() {
  let html = "";

  if (profile === "fast") {
    html = `
      <div class="setting-box"><b>Cache Settings:</b> Cached Only</div>
      <div class="setting-box"><b>Minimum Seeders:</b> 10</div>
      <div class="setting-box"><b>Max File Size:</b> 10 GB</div>
      <div class="setting-box"><b>Resolution:</b> 1080p max</div>
    `;
  }

  if (profile === "balanced") {
    html = `
      <div class="setting-box"><b>Cache Settings:</b> Cached Preferred</div>
      <div class="setting-box"><b>Minimum Seeders:</b> 5</div>
      <div class="setting-box"><b>File Size:</b> 5–20 GB</div>
      <div class="setting-box"><b>Resolution:</b> 1080p–4K</div>
    `;
  }

  if (profile === "quality") {
    html = `
      <div class="setting-box"><b>Cache Settings:</b> Allow Uncached</div>
      <div class="setting-box"><b>Minimum Seeders:</b> 1</div>
      <div class="setting-box"><b>File Size:</b> 20–100 GB</div>
      <div class="setting-box"><b>Resolution:</b> 4K only</div>
    `;
  }

  document.getElementById("settings").innerHTML = html;
}

function install() {
  const url = document.getElementById("addonUrl").value.trim();

  if (!url.startsWith("http")) {
    alert("Invalid URL");
    return;
  }

  const link = "stremio://addon-install?url=" + encodeURIComponent(url);

  const btn = document.getElementById("installLink");
  btn.href = link;
  btn.style.display = "block";
}
</script>

</body>
</html>
